server {
  listen 80;
  server_name localhost;

  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";
  add_header Referrer-Policy "strict-origin";

  # Allow scripts/styles from CDN (Chart.js, vis.js) and API calls to self
  add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; connect-src 'self'; font-src 'self' fonts.googleapis.com fonts.gstatic.com; img-src 'self' data:;";

  location = /.well-known/security.txt {
    alias /usr/share/nginx/html/security.txt;
  }

  # Proxy all /api/ requests to the Node.js backend
  location /api/ {
    proxy_pass         http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  location / {
    root  /usr/share/nginx/html;
    index index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}